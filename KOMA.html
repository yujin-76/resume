<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMA 스타일 쇼핑몰 레이아웃</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #333333;
            width: 100%;
            /* 화면이 줄어들어도 이미지가 찌그러지지 않고 가로 스크롤이 생기도록 설정 */
            overflow-x: auto;
        }

        /* 1. 헤더 영역 */
        header {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 30px 40px;
            background-color: #fff;
        }
        .header-left .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .header-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .header-center .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .search-container {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 2px;
        }
        .search-container input {
            border: none;
            outline: none;
            width: 100px;
            font-size: 14px;
            padding-left: 5px;
        }
        .header-right a {
            color: #333;
            font-size: 20px;
            text-decoration: none;
        }

        /* 메인 영역 */
        main {
            width: 100%;
        }

        /* 2. 메인 배너 영역 */
        .hero-banner {
            width: 100%;
            padding: 0 40px;
            margin-bottom: 80px;
            /* 창을 아무리 줄여도 이미지가 작아지지 않도록 최소 너비 고정 */
            min-width: 1200px;
        }
        .hero-banner img {
            width: 100%;
            height: 550px;
            display: block;
            object-fit: cover;
        }

        /* 3. 하단 상품 그리드 레이아웃 */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 50px 30px; 
            width: 100%;
            max-width: 1400px; 
            padding: 0 40px;
            margin: 0 auto; 
            /* 창을 줄여도 하단 상품 사진 크기가 고정되도록 설정 */
            min-width: 1200px;
        }

        .product-item {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .product-tag {
            position: absolute;
            top: -25px;
            left: 0;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: #111;
        }

        .product-image-box {
            width: 100%;
            height: 280px; 
            background-color: #f5f5f5;
            margin-bottom: 12px; 
            overflow: hidden;
        }
        .product-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .product-name {
            font-size: 14px;
            font-weight: 500;
            color: #222;
        }
        .product-price {
            font-size: 13px;
            font-weight: 400;
            color: #777;
        }

        /* 우측 세로형 사진 영역 */
        .right-banner-item {
            grid-column: 4;     
            grid-row: 1 / 3;    
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .right-image-box {
            width: 100%;
            height: 100%;       
            background-color: #f5f5f5;
            overflow: hidden;
        }
        .right-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;  
        }

        /* 4. 하단 버튼 영역 */
        .more-btn-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 60px 0 100px 0;
        }
        .view-all-btn {
            background: none;
            border: 1px solid #222;
            padding: 14px 45px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            color: #222;
        }
        .view-all-btn:hover {
            background-color: #222;
            color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="header-center">
            <div class="logo">
                <a href="KOMA.html" style="color: inherit; text-decoration: none;">KOMA</a>
            </div>
        </div>
        <div class="header-right">
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" style="font-size: 16px;"></i>
        <input type="text">
    </div>
    <a href="koma_login.html"><i class="fa-regular fa-user"></i></a>
    <a href="#"><i class="fa-solid fa-bag-shopping"></i></a>
</div>
    </header>

    <main>
        <section class="hero-banner">
            <a href="koma_3.html">
                <img src="komaphoto.png" alt="Main Banner">
            </a>
        </section>

        <div class="content-grid">
            <div class="product-item">
                <span class="product-tag">New</span>
                <div class="product-image-box">
                    <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=500&q=80" alt="Product 1">
                </div>
                <div class="product-info">
                    <span class="product-name">KOMA 시그니처 블록 링</span>
                    <span class="product-price">185,000원</span>
                </div>
            </div>
            
            <div class="product-item">
                <span class="product-tag">Best</span>
                <div class="product-image-box">
                    <img src="https://images.unsplash.com/photo-1603561591411-07134e71a2a9?auto=format&fit=crop&w=500&q=80" alt="Product 2">
                </div>
                <div class="product-info">
                    <span class="product-name">웨이브 실버 레이어 링</span>
                    <span class="product-price">142,000원</span>
                </div>
            </div>
            
            <div class="product-item">
                <span class="product-tag">Best</span>
                <div class="product-image-box">
                    <img src="https://images.unsplash.com/photo-1598560917505-59a3ad559071?auto=format&fit=crop&w=500&q=80" alt="Product 3">
                </div>
                <div class="product-info">
                    <span class="product-name">클래식 오벌 골드 링</span>
                    <span class="product-price">235,000원</span>
                </div>
            </div>

            <div class="right-banner-item">
                <span class="product-tag">Featured Studio</span>
                <div class="right-image-box">
                    <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=600&q=80" alt="Right Tall Banner">
                </div>
            </div>

            <div class="product-item">
                <span class="product-tag">New</span>
                <div class="product-image-box">
                    <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?auto=format&fit=crop&w=500&q=80" alt="Product 4">
                </div>
                <div class="product-info">
                    <span class="product-name">미니멀 스퀘어 실버 체인</span>
                    <span class="product-price">98,000원</span>
                </div>
            </div>
            
            <div class="product-item">
                <span class="product-tag">Best</span>
                <div class="product-image-box">
                    <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?auto=format&fit=crop&w=500&q=80" alt="Product 5">
                </div>
                <div class="product-info">
                    <span class="product-name">언밸런스 볼륨 와이드 링</span>
                    <span class="product-price">169,000원</span>
                </div>
            </div>
            
            <div class="product-item">
                <span class="product-tag">Best</span>
                <div class="product-image-box">
                    <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=500&q=80" alt="Product 6">
                </div>
                <div class="product-info">
                    <span class="product-name">다이아 크러스트 가드 링</span>
                    <span class="product-price">310,000원</span>
                </div>
            </div>
        </div>

        <div class="more-btn-container">
            <a href="koma_2.html" style="text-decoration: none;">
                <button class="view-all-btn">View All Collection</button>
            </a>
        </div>
    </main>

</body>
</html>
