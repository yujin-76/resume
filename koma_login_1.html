<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOMA 스타일 - 회원가입</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #ffffff;
            color: #333333;
            width: 100%;
            overflow-x: hidden;
        }

    
        header {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 30px 40px;
            background-color: #fff;
        }
        .header-left {
            display: flex;
            align-items: center;
            z-index: 10;
        }
        .header-left .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .header-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .header-center .logo-main-link {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 6px;
            text-transform: uppercase;
            white-space: nowrap;
            text-decoration: none;
            color: #333333;
            display: inline-block;
            position: relative;
            z-index: 999;
            pointer-events: auto;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }
        .search-container {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding-bottom: 2px;
        }
        .search-container input {
            border: none;
            outline: none;
            width: 100px;
            font-size: 14px;
            padding-left: 5px;
        }
        .header-right a {
            color: #333;
            font-size: 20px;
            text-decoration: none;
        }

       
        main {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            padding: 60px 20px 100px 20px;
            text-align: center;
        }

        .join-title {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #111111;
            margin-bottom: 40px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #222;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            height: 45px;
            border: 1px solid #aaa;
            background-color: #fcfcfc;
            padding: 0 15px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #111;
        }

        .form-help-text {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            display: block;
        }

        .join-submit-btn {
            width: 100%;
            height: 48px;
            background-color: #111;
            color: #fff;
            border: none;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        .join-submit-btn:hover {
            background-color: #333;
        }

        .join-footer {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }
        .join-footer a {
            color: #111;
            font-weight: bold;
            text-decoration: none;
            margin-left: 5px;
        }
        .join-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

  
    <header>
        <div class="header-left">
            <button class="menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="header-center">
            <a href="KOMA.html" class="logo-main-link">KOMA</a>
        </div>
        <div class="header-right">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass" style="font-size: 16px;"></i>
                <input type="text">
            </div>
           
            <a href="koma_login.html"><i class="fa-regular fa-user"></i></a>
            <a href="#"><i class="fa-solid fa-bag-shopping"></i></a>
        </div>
    </header>

    <main>
        <h2 class="join-title">회원가입</h2>

        
     
        <form action="#" method="POST" onsubmit="location.href='koma_login_2.html'; return false;">
            
            <div class="form-group">
                <label for="joinId">아이디</label>
                <input type="text" id="joinId" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="joinPw">비밀번호</label>
                <input type="password" id="joinPw" required autocomplete="new-password">
                <span class="form-help-text">영문, 숫자, 특수문자를 포함하여 8자 이상 입력해주세요.</span>
            </div>

            <div class="form-group">
                <label for="joinPwConfirm">비밀번호 확인</label>
                <input type="password" id="joinPwConfirm" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="joinName">이름</label>
                <input type="text" id="joinName" required>
            </div>

            <div class="form-group">
                <label for="joinPhone">휴대폰 번호</label>
                <input type="tel" id="joinPhone" placeholder="010-0000-0000" required>
            </div>

            <div class="form-group">
                <label for="joinEmail">이메일</label>
                <input type="email" id="joinEmail" placeholder="koma@example.com" required>
            </div>

            <button type="submit" class="join-submit-btn">CREATE ACCOUNT</button>
        </form>

        <div class="join-footer">
            이미 계정이 있으신가요? <a href="koma_login.html">로그인하기</a>
        </div>
    </main>

</body>
</html>
